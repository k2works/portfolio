site_name: Site Name
site_description: Site Description
site_author: Project Team
repo_url: https://github.com/k2works/claude-code-booster
repo_name: claude-code-booster

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: plantuml
          class: plantuml
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - pymdownx.tasklist
  - pymdownx.emoji
  - admonition
  - toc:
      permalink: true
  - plantuml_markdown:
      server: !!python/object/apply:os.getenv
        - PLANTUML_SERVER_URL
        - http://www.plantuml.com/plantuml
      format: svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js
  - assets/js/extra.js

extra:
  plantuml_url: http://www.plantuml.com/plantuml
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/k2works
      name: GitHub Repository/claude-code-booster

plugins:
  - search

exclude_docs: |
  wiki

nav:
  - Home: index.md
  - 戦略:
      - 概要: strategy/index.md
  - 要件:
      - 概要: requirements/index.md
  - 設計:
      - 概要: design/index.md
  - 開発:
      - 概要: development/index.md
  - 運用:
      - 概要: operation/index.md
  - レビュー:
      - 概要: review/index.md
  - ADR:
      - 概要: adr/index.md
  - 記事:
      - 概要: article/index.md
      - テスト駆動開発から始めるプログラミング入門: article/getting-start-tdd/index.md
      - Grokking Functional Programming: article/grokkingfp/index.md
      - Grokking Concurrency: article/grokking-concurrency/index.md
      - 関数型デザイン - 原則、パターン、実践: article/functional-desgin-ppp/index.md
      - 実践データベース設計：基幹業務システム編: article/practical-database-design/index.md
  - リファレンス:
      - 概要: reference/index.md
      - よいソフトウェアとは: reference/よいソフトウェアとは.md
