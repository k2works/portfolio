site_name: Portfolio
site_description: ポートフォリオプロジェクトのドキュメント。戦略・要件・設計・開発・運用・記事・リファレンス・テンプレートを一元管理。
site_author: Project Team
repo_url: https://github.com/k2works/portfolio
repo_name: k2works/portfolio

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: plantuml
          class: plantuml
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - pymdownx.tasklist
  - pymdownx.emoji
  - admonition
  - toc:
      permalink: true
  - plantuml_markdown:
      server: !!python/object/apply:os.getenv
        - PLANTUML_SERVER_URL
        - http://www.plantuml.com/plantuml
      format: svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js
  - assets/js/extra.js

extra:
  plantuml_url: http://www.plantuml.com/plantuml
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/k2works/portfolio
      name: GitHub Repository/portfolio

plugins:
  - search

exclude_docs: |
  wiki

nav:
  - Home: index.md
  - 要件:
      - 概要: requirements/index.md
      - 要件定義書: requirements/requirements_definition.md
      - ビジネスユースケース: requirements/business_usecase.md
      - システムユースケース: requirements/system_usecase.md
      - ユーザーストーリー: requirements/user_story.md
  - 設計:
      - 概要: design/index.md
      - バックエンドアーキテクチャ: design/architecture_backend.md
      - フロントエンドアーキテクチャ: design/architecture_frontend.md
      - インフラストラクチャアーキテクチャ: design/architecture_infrastructure.md
      - UI 設計: design/ui_design.md
      - 技術スタック: design/tech_stack.md
      - テスト戦略: design/test_strategy.md
      - 非機能要件: design/non_functional.md
      - 運用要件: design/operation.md
  - 開発:
      - 概要: development/index.md
      - リリース計画: development/release_plan.md
      - イテレーション 1 計画: development/iteration_plan-1.md
      - イテレーション 1 ふりかえり: development/retrospective-1.md
      - イテレーション 1 完了報告書: development/iteration_report-1.md
      - イテレーション 2 計画: development/iteration_plan-2.md
      - イテレーション 2 ふりかえり: development/retrospective-2.md
      - イテレーション 2 完了報告書: development/iteration_report-2.md
      - イテレーション 3 計画: development/iteration_plan-3.md
      - イテレーション 3 ふりかえり: development/retrospective-3.md
      - イテレーション 3 完了報告書: development/iteration_report-3.md
      - v0.1 リリース完了報告書: development/release_report-0_1_0.md
      - イテレーション 4 計画: development/iteration_plan-4.md
      - イテレーション 4 ふりかえり: development/retrospective-4.md
      - イテレーション 4 完了報告書: development/iteration_report-4.md
      - イテレーション 5 計画: development/iteration_plan-5.md
      - イテレーション 5 ふりかえり: development/retrospective-5.md
      - イテレーション 5 完了報告書: development/iteration_report-5.md
