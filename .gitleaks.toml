# gitleaks 設定
# 公式: https://github.com/gitleaks/gitleaks
# v8 系では `[allowlist]` は map（単一テーブル）として書く。
# 配列形式の `[[allowlist]]` は v8 で廃止されたため、paths を一つに統合する。

[extend]
# デフォルトルールを継承
useDefault = true

[allowlist]
description = "ドキュメント / ランブック / lock ファイル / ビルド成果物のサンプル・プレースホルダーは除外"
paths = [
  '''docs/.*\.md$''',
  '''ops/runbook/.*\.md$''',
  '''README\.md$''',
  '''\.env\.example$''',
  '''package-lock\.json$''',
  '''apps/.*/dist/.*''',
]

# プロジェクト固有のシークレット名検出ルール
[[rules]]
id = "heroku-api-key"
description = "Heroku API Key（UUID 形式）"
regex = '''(?i)heroku[_-]?api[_-]?key[\s:='"]+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
keywords = ["heroku"]

[[rules]]
id = "heroku-api-key-hrku"
description = "Heroku API Key（HRKU- プレフィックス形式、2024 年以降）"
regex = '''HRKU-[A-Za-z0-9_-]{40,}'''
keywords = ["HRKU"]
