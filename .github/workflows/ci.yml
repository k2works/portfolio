name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint + Test (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Static analysis (ESLint + Prettier + TypeScript)
        run: |
          npm run --workspace @portfolio/web lint
          npm run --workspace @portfolio/web format:check
          npm run --workspace @portfolio/web typecheck
      - name: Unit + integration tests
        run: npm run --workspace @portfolio/web test

  build:
    name: Build (Astro)
    runs-on: ubuntu-latest
    needs: lint-test
    # MkDocs のビルドは Deploy MkDocs ワークフロー (.github/workflows/mkdocs.yml)
    # で main push 時に GitHub Pages へ別経路でデプロイされるため、ここでは
    # Astro 本体のビルドのみを検証する（PlantUML 経由の遅延と外部依存を排除）。
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Node dependencies
        run: npm ci
      - name: Build Astro
        run: npm run --workspace @portfolio/web build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 7

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx --workspace @portfolio/web playwright install --with-deps chromium
      - name: Run Playwright tests against built dist
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: |
          PORT=3000 NODE_ENV=development node apps/web/server.js &
          SERVER_PID=$!
          sleep 3
          npm run --workspace @portfolio/web test:e2e
          kill $SERVER_PID
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Lighthouse CI
        run: npm run --workspace @portfolio/web lhci

  security:
    name: Security (gitleaks + npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: npm audit (production only)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
