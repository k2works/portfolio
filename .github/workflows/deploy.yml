name: Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production-promote
          - production-deploy

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy to Heroku staging
    runs-on: ubuntu-latest
    # main / develop への push、または workflow_dispatch（target=staging）で起動
    if: github.event_name == 'push' || github.event.inputs.target == 'staging'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Heroku への git push に全履歴が必要
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Astro (CI チェック・Heroku 側でも再ビルドされる)
        run: npm run --workspace @portfolio/web build
      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh
      - name: Deploy to Heroku staging via git push
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP: ${{ secrets.HEROKU_APP_STAGING }}
          HEROKU_EMAIL: ${{ secrets.HEROKU_EMAIL }}
        run: |
          git config --global user.email "$HEROKU_EMAIL"
          git config --global user.name "GitHub Actions"
          # Heroku は HTTP Basic 認証（URL 埋め込み）を 2024 年に非推奨化したため、
          # ~/.netrc を経由した git credentials で認証する。
          # `heroku git:remote` は remote URL を追加するだけで netrc を書かない
          # （netrc は通常 `heroku login` が書く）ので、ここで明示的に作成する。
          cat > "$HOME/.netrc" <<EOF
          machine git.heroku.com
            login $HEROKU_EMAIL
            password $HEROKU_API_KEY
          machine api.heroku.com
            login $HEROKU_EMAIL
            password $HEROKU_API_KEY
          EOF
          chmod 600 "$HOME/.netrc"
          heroku git:remote -a "$HEROKU_APP"
          git push heroku HEAD:main --force

  promote-to-production:
    name: Promote staging to production
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'production-promote'
    steps:
      - uses: actions/checkout@v6
      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh
      - name: Promote staging to production
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku pipelines:promote -a ${{ secrets.HEROKU_APP_STAGING }} \
            --to ${{ secrets.HEROKU_APP_PRODUCTION }}

  deploy-production:
    name: Deploy to Heroku production
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'production-deploy'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Astro for production
        run: npm run --workspace @portfolio/web build
      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh
      - name: Deploy to Heroku production via git push
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP: ${{ secrets.HEROKU_APP_PRODUCTION }}
          HEROKU_EMAIL: ${{ secrets.HEROKU_EMAIL }}
        run: |
          git config --global user.email "$HEROKU_EMAIL"
          git config --global user.name "GitHub Actions"
          cat > "$HOME/.netrc" <<EOF
          machine git.heroku.com
            login $HEROKU_EMAIL
            password $HEROKU_API_KEY
          machine api.heroku.com
            login $HEROKU_EMAIL
            password $HEROKU_API_KEY
          EOF
          chmod 600 "$HOME/.netrc"
          heroku git:remote -a "$HEROKU_APP"
          git push heroku HEAD:main --force
