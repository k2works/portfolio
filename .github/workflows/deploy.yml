name: Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production-promote

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy to Heroku staging
    runs-on: ubuntu-latest
    # main / develop への push、または workflow_dispatch（target=staging）で起動
    if: github.event_name == 'push' || github.event.inputs.target == 'staging'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Heroku への git push に全履歴が必要
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Astro (CI チェック・Heroku 側でも再ビルドされる)
        run: npm run --workspace @portfolio/web build
      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh
      - name: Deploy to Heroku staging via git push
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP: ${{ secrets.HEROKU_APP_STAGING }}
          HEROKU_EMAIL: ${{ secrets.HEROKU_EMAIL }}
        run: |
          git config --global user.email "$HEROKU_EMAIL"
          git config --global user.name "GitHub Actions"
          # Heroku は HTTP Basic 認証（URL 埋め込み）を 2024 年に非推奨化したため、
          # Heroku CLI が ~/.netrc を自動生成する経路で認証する。
          # HEROKU_API_KEY 環境変数を CLI が拾い、git push heroku で透過的に使う。
          heroku git:remote -a "$HEROKU_APP"
          git push heroku HEAD:main --force

  promote-to-production:
    name: Promote staging to production
    runs-on: ubuntu-latest
    # secrets が設定されるまではスキップ。
    # v0.1 リリース時に下記の if を以下に置き換え:
    #   if: github.event.inputs.target == 'production-promote'
    if: false
    steps:
      - uses: actions/checkout@v4
      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh
      - name: Promote staging to production
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku pipelines:promote -a ${{ secrets.HEROKU_APP_STAGING }} \
            --to ${{ secrets.HEROKU_APP_PRODUCTION }}
